default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USER", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "beheld_backend_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME_TEST", "beheld_backend_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "beheld_backend_production") %>
  url: <%= ENV["DATABASE_URL"] %>
