<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>beheld.dev — Beheld by signal. Decided by you.</title>
    <meta name="description" content="Daemon local que captura sinais reais das suas sessões com Claude Code — stack, test ratio, trajetória — e gera um bundle assinado verificável offline. Forever free for developers." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://api.fontshare.com/v2/css?f[]=switzer@200,300,400,500,600,700,800&display=swap" rel="stylesheet" />

    <!--
      Pre-paint theme bootstrap. Runs BEFORE the bundle loads so users
      never see a flash of the wrong theme. Reachable themes:
        · "dark"   → html.dark              (DEFAULT)
        · "github" → html[data-theme="github"]
      Legacy values ("auto", "light") are migrated to "dark" on read.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("dp-theme");
          var mode = saved === "github" ? "github" : "dark";
          if (mode === "github") {
            document.documentElement.setAttribute("data-theme", "github");
          } else {
            document.documentElement.classList.add("dark");
          }
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
