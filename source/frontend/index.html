<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>beheld.dev — Beheld by signal. Decided by you.</title>
    <meta name="description" content="Daemon local que captura sinais reais das suas sessões com Claude Code — stack, test ratio, trajetória — e gera um bundle assinado verificável offline. Forever free for developers." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link href="https://api.fontshare.com/v2/css?f[]=switzer@200,300,400,500,600,700,800&display=swap" rel="stylesheet" />

    <!--
      Pre-paint theme bootstrap.  Runs BEFORE the bundle loads so dark-mode
      users never see a flash of light page.  Resolves the active theme by:
        1. localStorage["dp-theme"] (auto | light | dark)
        2. prefers-color-scheme when no explicit choice persisted
      Adds `class="dark"` on <html> to flip every `dark:` Tailwind utility.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("dp-theme");
          var resolved =
            saved === "dark" ? "dark"
            : saved === "light" ? "light"
            : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches)
                ? "dark"
                : "light";
          if (resolved === "dark") document.documentElement.classList.add("dark");
          if (saved === "dark" || saved === "light") {
            document.documentElement.setAttribute("data-theme", saved);
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
