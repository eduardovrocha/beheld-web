# Production orchestration for beheld (Rails 7.2 API + React SPA + Caddy).
#
# Postgres and Redis run NATIVELY on the host (no containers). Rails reaches
# them via 127.0.0.1 thanks to `network_mode: host`. The frontend is built
# once into ../../source/frontend/dist and served by Caddy as static files.
#
# Secrets live outside the repo, in /etc/beheld/ (perms 600), and are
# loaded via env_file. See README.md for the exact files + populated values.

name: beheld

services:
  backend:
    build:
      context: ../../source/backend
      dockerfile: Dockerfile
    image: beheld-backend:prod
    container_name: beheld-backend
    network_mode: host
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "false"
      BINDING: "127.0.0.1"
      PORT: "3000"
    env_file:
      - /etc/beheld/app.env
      - /etc/beheld/postgres.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Sidekiq worker. Reaproveita a image que backend acabou de buildar
  # (mesmo Gemfile, mesmo app/), so troca o comando. Sem build:
  # context — depends_on garante que backend ja construiu beheld-backend:prod.
  # network_mode: host pra alcancar Redis em 127.0.0.1:6379 (nativo no VPS,
  # mesmo padrao do backend). Concorrencia conservadora — pouco volume hoje.
  sidekiq:
    image: beheld-backend:prod
    container_name: beheld-sidekiq
    network_mode: host
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
    env_file:
      - /etc/beheld/app.env
      - /etc/beheld/postgres.env
    command: bundle exec sidekiq -c 5
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # Sem healthcheck: a image slim nao tem pgrep/ps, e o exit do processo
    # ja dispara o restart policy. Pra observar estado, use docker logs ou
    # `Sidekiq::ProcessSet.new.size` via rails runner.

  caddy:
    image: caddy:2-alpine
    container_name: beheld-caddy
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../source/frontend/dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    # `app.env` traz BEHELD_INSTALL_SCRIPT_URL (opcional). Caddy interpola
    # `{$VAR:default}` em tempo de boot — basta a env estar visivel no
    # container.
    env_file:
      - /etc/beheld/app.env
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  caddy_data:
    name: beheld-caddy-data
  caddy_config:
    name: beheld-caddy-config
